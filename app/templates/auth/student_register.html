{% extends "base.html" %}

{% block title %}Student Register - Placement Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-lg-7">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-graduate fa-3x text-primary mb-3"></i>
                    <h2 class="card-title">Student Registration</h2>
                    <p class="text-muted">Join PlacementHub and start your placement journey</p>
                </div>

                <form method="POST" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="usn" class="form-label"><i class="fas fa-id-card me-2"></i>USN / Student ID <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="usn" name="usn" placeholder="Enter your student ID" required>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label"><i class="fas fa-user me-2"></i>Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label"><i class="fas fa-envelope me-2"></i>Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="your.email@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label"><i class="fas fa-phone me-2"></i>Phone (10 digits) <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="phone" name="phone" pattern="\d{10}" placeholder="1234567890" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="branch" class="form-label"><i class="fas fa-graduation-cap me-2"></i>Branch <span class="text-danger">*</span></label>
                            <select class="form-select" id="branch" name="branch" required>
                                <option value="">Select Branch</option>
                                <option value="CSE">Computer Science Engineering</option>
                                <option value="ECE">Electronics and Communication</option>
                                <option value="ME">Mechanical Engineering</option>
                                <option value="CE">Civil Engineering</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="semester" class="form-label"><i class="fas fa-book me-2"></i>Semester <span class="text-danger">*</span></label>
                            <select class="form-select" id="semester" name="semester" required>
                                <option value="">Select Semester</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="cgpa" class="form-label"><i class="fas fa-sigma me-2"></i>CGPA <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="cgpa" name="cgpa" step="0.01" min="0" max="10" placeholder="3.8" required>
                    </div>

                    <div class="mb-3">
                        <label for="skills" class="form-label"><i class="fas fa-code me-2"></i>Skills (comma-separated)</label>
                        <input type="text" class="form-control" id="skills" name="skills" placeholder="Python, Java, C++, SQL, ...">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label"><i class="fas fa-lock me-2"></i>Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter a strong password" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label"><i class="fas fa-key me-2"></i>Confirm Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>

                <hr>
                <p class="text-center text-muted">Already registered? 
                    <a href="{{ url_for('auth.student_login') }}" class="text-primary fw-bold">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
